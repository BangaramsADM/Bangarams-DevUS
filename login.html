<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bangarams — Staff Login</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#C8973F; --gold-light:#E8C97A; --gold-pale:#F5E6C0;
  --ink:#1C1410; --ink-deep:#0F0A04; --mist:#A89880;
}
body{
  background:var(--ink-deep);
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  font-family:'Raleway',sans-serif; padding:24px;
}

/* ── LOGO ── */
.logo{text-align:center; margin-bottom:40px;}
.logo-rule{width:220px; height:1px; background:rgba(200,151,63,.35); margin:8px auto;}
.logo-diamond{
  width:8px; height:8px; background:var(--gold); transform:rotate(45deg);
  margin:0 auto; opacity:.6; display:block;
}
.logo-wordmark{
  font-family:'Palatino Linotype','Book Antiqua',Palatino,serif;
  font-size:2.2rem; font-weight:700; color:var(--gold-light);
  letter-spacing:.18em;
}
.logo-tagline{
  font-family:'Palatino Linotype',Palatino,serif;
  font-size:.65rem; color:var(--mist); letter-spacing:.38em;
  font-style:italic; margin-top:4px;
}

/* ── CARD ── */
.card{
  background:rgba(200,151,63,.04);
  border:1px solid rgba(200,151,63,.14);
  padding:44px 48px; width:100%; max-width:420px;
}
.card-title{
  font-family:'Cinzel',serif; font-size:.6rem;
  letter-spacing:.45em; text-transform:uppercase;
  color:rgba(200,151,63,.55); margin-bottom:8px; text-align:center;
}
.card-subtitle{
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:1.05rem; color:rgba(168,152,128,.65);
  text-align:center; margin-bottom:30px; line-height:1.6;
}

/* ── FORM ── */
.field{margin-bottom:18px;}
label{
  display:block; font-family:'Cinzel',serif; font-size:.56rem;
  letter-spacing:.25em; text-transform:uppercase;
  color:rgba(200,151,63,.55); margin-bottom:8px;
}
input{
  width:100%; background:rgba(200,151,63,.05);
  border:1px solid rgba(200,151,63,.18);
  padding:12px 16px; color:#F5E6C0;
  font-family:'Raleway',sans-serif; font-size:.9rem;
  outline:none; transition:border-color .3s;
}
input:focus{border-color:rgba(200,151,63,.5);}
input::placeholder{color:rgba(168,152,128,.35);}
input.error-field{border-color:rgba(220,80,80,.5);}

.btn{
  width:100%; background:var(--gold); color:var(--ink);
  border:none; padding:14px 24px;
  font-family:'Cinzel',serif; font-size:.65rem;
  letter-spacing:.28em; text-transform:uppercase;
  cursor:pointer; transition:background .3s; margin-top:6px;
}
.btn:hover{background:var(--gold-light);}
.btn:disabled{background:rgba(200,151,63,.4); cursor:not-allowed;}

.error-msg{
  font-size:.72rem; color:rgba(220,80,80,.8);
  font-family:'Raleway',sans-serif; text-align:center;
  min-height:20px; margin-top:14px; letter-spacing:.04em;
}
.success-msg{
  font-size:.72rem; color:rgba(127,176,105,.9);
  font-family:'Raleway',sans-serif; text-align:center;
  min-height:20px; margin-top:14px; letter-spacing:.04em;
}

/* ── PANELS ── */
.panel{display:none;}
.panel.active{display:block;}

/* ── PASSWORD STRENGTH ── */
.pwd-hint{
  font-size:.65rem; color:rgba(168,152,128,.45);
  font-family:'Raleway',sans-serif; margin-top:6px;
  letter-spacing:.03em;
}

/* ── FOOTER ── */
.page-footer{
  margin-top:28px; text-align:center;
  font-size:.6rem; letter-spacing:.12em;
  color:rgba(168,152,128,.3); font-family:'Raleway',sans-serif;
}
.page-footer a{color:rgba(200,151,63,.45); text-decoration:none;}
.page-footer a:hover{color:var(--gold);}

/* ── USER BADGE (change-pwd screen) ── */
.user-badge{
  display:flex; align-items:center; gap:12px;
  background:rgba(200,151,63,.05);
  border:1px solid rgba(200,151,63,.12);
  padding:12px 16px; margin-bottom:24px;
}
.ub-avatar{
  width:36px; height:36px; border-radius:50%;
  background:rgba(200,151,63,.15); display:flex;
  align-items:center; justify-content:center;
  font-family:'Cinzel',serif; font-size:.8rem; color:var(--gold);
  flex-shrink:0;
}
.ub-name{font-size:.85rem; color:var(--gold-pale); font-family:'Cormorant Garamond',serif;}
.ub-role{font-size:.6rem; letter-spacing:.15em; color:var(--mist); text-transform:uppercase; font-family:'Cinzel',serif;}
</style>
</head>
<body>

<div class="logo">
  <div class="logo-rule"></div>
  <div class="logo-diamond"></div>
  <div class="logo-wordmark">BANGARAMS</div>
  <div class="logo-rule"></div>
  <div class="logo-tagline">SILVER · GOLD · DIAMONDS</div>
</div>

<!-- ── PANEL 1: LOGIN ── -->
<div class="card" id="panel-login">
  <div id="login-panel" class="panel active">
    <div class="card-title">Staff Portal</div>
    <div class="card-subtitle">Sign in to your Bangarams account</div>

    <div class="field">
      <label>Username or Email</label>
      <input type="text" id="login-user" placeholder="username or email" autocomplete="username">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-pwd" placeholder="••••••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>

    <button class="btn" id="login-btn" onclick="doLogin()">Sign In →</button>
    <div class="error-msg" id="login-err"></div>
  </div>

  <!-- ── PANEL 2: CHANGE PASSWORD (mustReset) ── -->
  <div id="reset-panel" class="panel">
    <div class="card-title">Set New Password</div>
    <div class="card-subtitle">Your password must be changed before continuing</div>

    <div class="user-badge" id="reset-user-badge">
      <div class="ub-avatar" id="reset-avatar">?</div>
      <div>
        <div class="ub-name" id="reset-name"></div>
        <div class="ub-role" id="reset-role"></div>
      </div>
    </div>

    <div class="field">
      <label>New Password</label>
      <input type="password" id="new-pwd" placeholder="Min. 8 characters"
             oninput="checkStrength()" autocomplete="new-password">
      <div class="pwd-hint" id="pwd-hint"></div>
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="new-pwd2" placeholder="Repeat password"
             onkeydown="if(event.key==='Enter')doChangePwd()" autocomplete="new-password">
    </div>

    <button class="btn" id="change-btn" onclick="doChangePwd()">Set Password →</button>
    <div class="error-msg"  id="change-err"></div>
    <div class="success-msg" id="change-ok"></div>
  </div>
</div>

<div class="page-footer">
  <a href="index.html">← Back to site</a>
  &nbsp;·&nbsp;
  Need help? <a href="mailto:hello@bangarams.com">hello@bangarams.com</a>
</div>

<script src="auth.js"></script>
<script>
// If already logged in (and not mustReset), go straight to destination
(function() {
  const s = AUTH.session();
  if (s && !s.mustReset) {
    const artisan = ['artisan_ramouji','artisan_kira'].includes(s.role);
    window.location.href = s.role === 'site_admin' ? 'admin.html' : artisan ? 'dashboard.html' : 'index.html';
  }
})();

async function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pwd  = document.getElementById('login-pwd').value;
  const err  = document.getElementById('login-err');
  const btn  = document.getElementById('login-btn');

  err.textContent = '';
  if (!user || !pwd) { err.textContent = 'Please enter your username and password.'; return; }

  btn.textContent = 'Signing in…'; btn.disabled = true;
  const sess = await AUTH.login(user, pwd);
  btn.textContent = 'Sign In →'; btn.disabled = false;

  if (!sess) {
    err.textContent = 'Invalid credentials. Please try again.';
    document.getElementById('login-pwd').value = '';
    document.getElementById('login-pwd').focus();
    return;
  }

  if (sess.mustReset) {
    showResetPanel(sess);
  } else {
    const artisan = ['artisan_ramouji','artisan_kira'].includes(sess.role);
    window.location.href = sess.role === 'site_admin' ? 'admin.html' : artisan ? 'dashboard.html' : 'index.html';
  }
}

function showResetPanel(sess) {
  document.getElementById('login-panel').classList.remove('active');
  document.getElementById('reset-panel').classList.add('active');

  const initials = sess.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('reset-avatar').textContent = initials;
  document.getElementById('reset-name').textContent   = sess.name;
  const role = AUTH.ROLES[sess.role];
  document.getElementById('reset-role').textContent   = role ? role.label : sess.role;
  document.getElementById('new-pwd').focus();
}

function checkStrength() {
  const v    = document.getElementById('new-pwd').value;
  const hint = document.getElementById('pwd-hint');
  if (!v) { hint.textContent = ''; return; }
  const checks = [v.length >= 8, /[A-Z]/.test(v), /[0-9]/.test(v), /[^A-Za-z0-9]/.test(v)];
  const score  = checks.filter(Boolean).length;
  const labels = ['','Weak','Fair','Good','Strong'];
  const colors = ['','rgba(220,80,80,.7)','rgba(220,160,50,.7)','rgba(127,176,105,.6)','rgba(127,176,105,.9)'];
  hint.textContent  = labels[score] || '';
  hint.style.color  = colors[score] || '';
}

async function doChangePwd() {
  const p1  = document.getElementById('new-pwd').value;
  const p2  = document.getElementById('new-pwd2').value;
  const err = document.getElementById('change-err');
  const ok  = document.getElementById('change-ok');
  const btn = document.getElementById('change-btn');

  err.textContent = ''; ok.textContent = '';

  if (p1.length < 8)   { err.textContent = 'Password must be at least 8 characters.'; return; }
  if (p1 !== p2)        { err.textContent = 'Passwords do not match.'; return; }

  btn.textContent = 'Saving…'; btn.disabled = true;
  const sess = AUTH.session();
  const done = await AUTH.changePassword(sess.id, p1);
  btn.textContent = 'Set Password →'; btn.disabled = false;

  if (done) {
    ok.textContent = 'Password updated! Redirecting…';
    setTimeout(() => {
      const artisan = ['artisan_ramouji','artisan_kira'].includes(sess.role);
      window.location.href = sess.role === 'site_admin' ? 'admin.html' : artisan ? 'dashboard.html' : 'index.html';
    }, 1400);
  } else {
    err.textContent = 'Something went wrong. Please try again.';
  }
}
</script>
</body>
</html>
